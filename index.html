<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bibliotech — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #0f1117;
      color: #dde1ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 6px;
      padding: 40px 36px;
      width: 360px;
      border-top: 3px solid #C84B31;
    }

    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 26px; color: #C84B31; font-style: italic; }
    .logo p  { font-size: 11px; color: #606880; letter-spacing: 2px;
                text-transform: uppercase; font-family: monospace; margin-top: 4px; }

    .field { margin-bottom: 16px; }
    label  { display: block; font-size: 11px; color: #606880;
             font-family: monospace; letter-spacing: 1.5px;
             text-transform: uppercase; margin-bottom: 6px; }

    input  {
      width: 100%; padding: 10px 12px;
      background: #13161f; border: 1px solid #2e3347;
      border-radius: 4px; color: #dde1ee;
      font-size: 14px; font-family: Georgia, serif;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #C84B31; }

    .btn {
      width: 100%; padding: 12px;
      background: #C84B31; color: white;
      border: none; border-radius: 4px;
      font-size: 14px; font-family: Georgia, serif;
      cursor: pointer; margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover    { background: #e05a3c; }
    .btn:disabled { background: #555; cursor: not-allowed; }

    .error {
      background: rgba(220,38,38,0.12);
      border: 1px solid rgba(220,38,38,0.3);
      color: #f87171; border-radius: 4px;
      padding: 10px 12px; font-size: 13px;
      margin-bottom: 14px; display: none;
    }
    .error.show { display: block; }

    .hint {
      text-align: center; font-size: 11px;
      color: #606880; margin-top: 16px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Library Management</h1>
    <p>Library Management System</p>
  </div>

  <div class="error" id="errorMsg"></div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
  </div>

  <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

  <p class="hint">Role-based redirect on login</p>
</div>

<script type="module">
  import { login } from "./js/auth.js";

  window.handleLogin = async function () {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl  = document.getElementById("errorMsg");
    const btn      = document.getElementById("loginBtn");

    // Basic validation
    if (!email || !password) {
      errorEl.textContent = "Please enter your email and password.";
      errorEl.classList.add("show");
      return;
    }

    // Disable button while logging in
    btn.disabled    = true;
    btn.textContent = "Signing in...";
    errorEl.classList.remove("show");

    const error = await login(email, password);

    if (error) {
      errorEl.textContent = error;
      errorEl.classList.add("show");
      btn.disabled    = false;
      btn.textContent = "Sign In";
    }
    // On success, login() redirects automatically — no code needed here
  };

  // Allow Enter key to submit
  document.getElementById("password")
    .addEventListener("keydown", e => {
      if (e.key === "Enter") window.handleLogin();
    });
</script>

</body>
</html>
